<div class="product-update-container" *ngIf="!isLoading; else loadingState">
    <div class="update-card">
        <div class="update-card__header">
            <h1><i class="bi bi-pencil-square"></i> {{ 'PRODUCT_UPDATE.TITLE' | translate }}</h1>
            <p>{{ 'PRODUCT_UPDATE.SUBTITLE' | translate }}</p>
        </div>

        <div class="update-card__body">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>{{ 'PRODUCT_UPDATE.NAME_LABEL' | translate }}</label>
                    <input type="text" [(ngModel)]="product.name" class="form-input" [placeholder]="'PRODUCT_UPDATE.NAME_PH' | translate">
                </div>

                <div class="form-group full-width">
                    <label>{{ 'PRODUCT_UPDATE.DESC_LABEL' | translate }}</label>
                    <textarea rows="4" [(ngModel)]="product.description" class="form-input" [placeholder]="'PRODUCT_UPDATE.DESC_PH' | translate"></textarea>
                </div>

                <div class="form-group">
                    <label>{{ 'PRODUCT_UPDATE.PRICE_LABEL' | translate }} (₺)</label>
                    <input type="number" [(ngModel)]="product.price" class="form-input" [placeholder]="'0.00'">
                </div>

                <div class="form-group">
                    <label>{{ 'PRODUCT_UPDATE.STOCK_LABEL' | translate }}</label>
                    <input type="number" [(ngModel)]="product.stock" class="form-input" [placeholder]="'0'">
                </div>

                <div class="form-group full-width">
                    <label>{{ 'PRODUCT_UPDATE.CATEGORY_LABEL' | translate }}</label>
                    <select class="form-input" [(ngModel)]="product.categoryId">
                        <option value="">{{ 'PRODUCT_UPDATE.SELECT_CATEGORY' | translate }}</option>
                        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
                    </select>
                </div>

                <div class="discount-section full-width">
                    <h3><i class="bi bi-percent"></i> {{ 'PRODUCT_UPDATE.DISCOUNT_TITLE' | translate }}</h3>
                    <div class="discount-grid">
                        <div class="form-group">
                            <label>{{ 'PRODUCT_UPDATE.DISCOUNT_PERCENT' | translate }} (%)</label>
                            <input type="number" [(ngModel)]="product.discountPercentage" class="form-input" [placeholder]="'0'">
                        </div>
                        <div class="form-group">
                            <label>{{ 'PRODUCT_UPDATE.DISCOUNT_DURATION' | translate }}</label>
                            <select class="form-input" [(ngModel)]="discountDuration">
                                <option value="">{{ 'PRODUCT_UPDATE.SELECT_DURATION' | translate }}</option>
                                <option value="1h">1 {{ 'PRODUCT_UPDATE.HOURS' | translate }}</option>
                                <option value="3h">3 {{ 'PRODUCT_UPDATE.HOURS' | translate }}</option>
                                <option value="6h">6 {{ 'PRODUCT_UPDATE.HOURS' | translate }}</option>
                                <option value="12h">12 {{ 'PRODUCT_UPDATE.HOURS' | translate }}</option>
                                <option value="1d">1 {{ 'PRODUCT_UPDATE.DAYS' | translate }}</option>
                                <option value="3d">3 {{ 'PRODUCT_UPDATE.DAYS' | translate }}</option>
                                <option value="7d">7 {{ 'PRODUCT_UPDATE.DAYS' | translate }}</option>
                            </select>
                        </div>
                        <div class="form-group discount-btn-wrap">
                            <button class="btn btn--secondary btn--full" (click)="startDiscount()" [disabled]="!product.discountPercentage || !discountDuration">
                                <i class="bi bi-clock-history"></i> {{ 'PRODUCT_UPDATE.START_DISCOUNT' | translate }}
                            </button>
                        </div>
                    </div>
                    <div class="discount-info" *ngIf="product.discountEndDate">
                        <i class="bi bi-info-circle"></i>
                        {{ 'PRODUCT_UPDATE.ENDS_AT' | translate }}: <strong>{{ product.discountEndDate | date:'dd.MM.yyyy HH:mm' }}</strong>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn--secondary" (click)="onCancel()">{{ 'COMMON.CANCEL' | translate }}</button>
                <button class="btn btn--primary" (click)="onSubmit()" [disabled]="isSaving">
                    <i class="bi" [ngClass]="isSaving ? 'bi-arrow-repeat spin' : 'bi-check-lg'"></i>
                    {{ (isSaving ? 'COMMON.SAVING' : 'COMMON.SAVE') | translate }}
                </button>
            </div>
        </div>
    </div>
</div>

<ng-template #loadingState>
    <div class="loading-full">
        <div class="loader">
            <div class="spinner"></div>
            <p>{{ 'COMMON.LOADING' | translate }}</p>
        </div>
    </div>
</ng-template>
