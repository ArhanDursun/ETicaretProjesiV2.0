<div class="auth-page-content">
  <!-- LOGIN SECTION -->
  <div *ngIf="!needsVerification && !isForgotPasswordMode">
    <div class="auth-header">
      <div class="brand-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h2>{{ 'LOGIN.TITLE' | translate }}</h2>
      <p>{{ 'LOGIN.SUBTITLE' | translate }}</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-field">
        <label>{{ 'LOGIN.EMAIL' | translate }}</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" formControlName="email" placeholder="name@company.com">
        </div>
        <span class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
          {{ 'LOGIN.ERRORS.EMAIL_REQ' | translate }}
        </span>
      </div>

      <div class="form-field">
        <label>{{ 'LOGIN.PASSWORD' | translate }}</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input [type]="isPasswordVisible ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
          <button type="button" class="btn-toggle-pass" (click)="isPasswordVisible = !isPasswordVisible">
            <i class="bi" [ngClass]="isPasswordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-meta">
        <label class="custom-checkbox">
          <input type="checkbox" formControlName="rememberMe">
          <span class="checkmark"></span>
          <span class="label-text">{{ 'LOGIN.REMEMBER_ME' | translate }}</span>
        </label>
        <a href="javascript:void(0)" class="link-forgot" (click)="toggleForgotPasswordMode(true)">{{
          'LOGIN.FORGOT_PASSWORD' | translate }}</a>
      </div>

      <button type="submit" class="btn btn--accent btn--lg w-full" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">{{ 'LOGIN.SUBMIT' | translate }}</span>
        <div class="loader-dots" *ngIf="isLoading">
          <span></span><span></span><span></span>
        </div>
      </button>
    </form>
  </div>

  <!-- FORGOT PASSWORD SECTION -->
  <div *ngIf="isForgotPasswordMode">
    <div class="auth-header">
      <div class="brand-icon">
        <i class="bi bi-key-fill"></i>
      </div>
      <h2>{{ 'RESET.TITLE' | translate }}</h2>

      <div *ngIf="!isResetCodeSend">
        <p>{{ 'RESET.DESC_1' | translate }}</p>
        <div class="form-field text-left">
          <label>{{ 'LOGIN.EMAIL' | translate }}</label>
          <div class="input-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" [(ngModel)]="resetEmail">
          </div>
        </div>
        <button class="btn btn--accent btn--lg w-full" [disabled]="isSendingReset" (click)="onSendResetLink()">
          {{ (isSendingReset ? 'VERIFY.SENDING' : 'RESET.SEND_CODE') | translate }}
        </button>
      </div>

      <div *ngIf="isResetCodeSend">
        <p [innerHTML]="'RESET.DESC_2' | translate:{email: resetEmail}"></p>
        <div class="form-field">
          <div class="input-wrap centered">
            <input type="text" maxlength="6" [(ngModel)]="resetCode" class="otp-input-sm" placeholder="000000">
          </div>
        </div>
        <div class="form-field text-left">
          <label>{{ 'RESET.NEW_PASS' | translate }}</label>
          <div class="input-wrap">
            <i class="bi bi-shield-lock"></i>
            <input [type]="isPasswordVisible ? 'text' : 'password'" [(ngModel)]="newPassword">
            <button type="button" class="btn-toggle-pass" (click)="isPasswordVisible = !isPasswordVisible">
              <i class="bi" [ngClass]="isPasswordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
        </div>
        <div class="form-field text-left">
          <label>{{ 'RESET.CONFIRM_PASS' | translate }}</label>
          <div class="input-wrap">
            <i class="bi bi-shield-check"></i>
            <input [type]="isPasswordVisible ? 'text' : 'password'" [(ngModel)]="confirmPassword">
          </div>
        </div>
        <button class="btn btn--accent btn--lg w-full" [disabled]="isResetting" (click)="onResetPassword()">
          {{ (isResetting ? 'RESET.UPDATING' : 'RESET.UPDATE_BTN') | translate }}
        </button>
      </div>

      <button class="btn-back" (click)="toggleForgotPasswordMode(false)">
        <i class="bi bi-arrow-left"></i> {{ 'RESET.BACK' | translate }}
      </button>
    </div>
  </div>
</div>
