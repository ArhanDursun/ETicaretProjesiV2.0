<div class="auth-page">
    <div class="auth-card" *ngIf="step === 1">
        <div class="auth-header">
            <h1 class="logo-text">ETİCARET</h1>
            <p class="auth-subtitle">{{ 'REGISTER.STEP1.TITLE' | translate }}</p>
            <p class="auth-desc">{{ 'REGISTER.STEP1.SUBTITLE' | translate }}</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmitRequest()" class="auth-form">
            <div class="form-row-2">
                <div class="form-group">
                    <label>{{ 'REGISTER.STEP1.FIRST_NAME' | translate }}</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person"></i>
                        <input type="text" formControlName="firstName" [placeholder]="'REGISTER.STEP1.FIRST_NAME' | translate">
                    </div>
                </div>
                <div class="form-group">
                    <label>{{ 'REGISTER.STEP1.LAST_NAME' | translate }}</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person"></i>
                        <input type="text" formControlName="lastName" [placeholder]="'REGISTER.STEP1.LAST_NAME' | translate">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>{{ 'REGISTER.STEP1.USERNAME' | translate }}</label>
                <div class="input-wrapper">
                    <i class="bi bi-at"></i>
                    <input type="text" formControlName="username" [placeholder]="'REGISTER.STEP1.USERNAME' | translate">
                </div>
            </div>

            <div class="form-group">
                <label>{{ 'REGISTER.STEP1.EMAIL' | translate }}</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" formControlName="email" [placeholder]="'REGISTER.STEP1.EMAIL' | translate">
                </div>
            </div>

            <div class="form-group">
                <label>{{ 'REGISTER.STEP1.PHONE' | translate }}</label>
                <div class="input-wrapper">
                    <i class="bi bi-telephone"></i>
                    <input type="text" formControlName="phoneNumber" (input)="onPhoneInput($event)" placeholder="+90 5XX XXX XX XX">
                </div>
            </div>

            <div class="form-row-2">
                <div class="form-group">
                    <label>{{ 'REGISTER.STEP1.PASSWORD' | translate }}</label>
                    <div class="input-wrapper">
                        <i class="bi bi-shield-lock"></i>
                        <input [type]="isPasswordVisible ? 'text' : 'password'" formControlName="password" [placeholder]="'REGISTER.STEP1.PASSWORD' | translate">
                    </div>
                </div>
                <div class="form-group">
                    <label>{{ 'REGISTER.STEP1.CONFIRM_PASSWORD' | translate }}</label>
                    <div class="input-wrapper">
                        <i class="bi bi-shield-check"></i>
                        <input [type]="isPasswordVisible ? 'text' : 'password'" formControlName="confirmPassword" [placeholder]="'REGISTER.STEP1.CONFIRM_PASSWORD' | translate">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn--primary auth-submit" [disabled]="registerForm.invalid || isLoading">
                <i class="bi bi-person-plus" *ngIf="!isLoading"></i>
                <i class="bi bi-arrow-repeat spin" *ngIf="isLoading"></i>
                {{ (isLoading ? 'COMMON.LOADING' : 'REGISTER.STEP1.SUBMIT') | translate }}
            </button>
        </form>

        <div class="auth-footer">
            <p>{{ 'REGISTER.STEP1.HAVE_ACCOUNT' | translate }} <a routerLink="/login">{{ 'REGISTER.STEP1.LOGIN_LINK' | translate }}</a></p>
        </div>
    </div>

    <div class="auth-card" *ngIf="step === 2">
        <div class="auth-header">
            <h1 class="logo-text">ETİCARET</h1>
            <p class="auth-subtitle">{{ 'VERIFY.TITLE' | translate }}</p>
            <p class="auth-desc" [innerHTML]="'VERIFY.DESC' | translate:{email: userEmail}"></p>
        </div>

        <form [formGroup]="verifyForm" (ngSubmit)="onVerifyCode()" class="auth-form">
            <div class="form-group">
                <label>{{ 'VERIFY.CODE_LABEL' | translate }}</label>
                <input type="text" formControlName="code" maxlength="6" class="code-input" placeholder="000000">
            </div>

            <button type="submit" class="btn btn--primary auth-submit" [disabled]="verifyForm.invalid">
                <i class="bi bi-check2-circle"></i>
                {{ 'VERIFY.SUBMIT_BTN' | translate }}
            </button>
        </form>

        <button class="btn-back" (click)="step = 1">
            <i class="bi bi-arrow-left"></i> {{ 'REGISTER.STEP2.BACK' | translate }}
        </button>
    </div>
</div>
